<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeTracker</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

    <header>

        <div>

            <h1>LifeTracker</h1>

            <p id="fecha"></p>

        </div>

        <button id="themeButton">
            🌙
        </button>

    </header>

    <section class="dashboard">

        <div class="circle">

            <svg>

                <circle
                    class="background"
                    cx="90"
                    cy="90"
                    r="70">
                </circle>

                <circle
                    id="progressCircle"
                    class="progress"
                    cx="90"
                    cy="90"
                    r="70">
                </circle>

            </svg>

            <div class="circleText">

                <span id="generalPercent">0%</span>

                <small>Hoy</small>

            </div>

        </div>

        <div class="dashboardInfo">

            <div class="card">

                <h3>Objetivos</h3>

                <span id="goalCount">0</span>

            </div>

            <div class="card">

                <h3>Completados</h3>

                <span id="completedCount">0</span>

            </div>

            <div class="card">

                <h3>Racha</h3>

                <span>🔥 0</span>

            </div>

            <div class="card">

                <h3>Nivel</h3>

                <span>⭐ 1</span>

            </div>

        </div>

    </section>

    <section class="toolbar">

        <input
        id="search"
        placeholder="Buscar objetivo...">

        <select id="filter">

            <option value="all">Todos</option>

            <option value="pending">Pendientes</option>

            <option value="completed">Completados</option>

        </select>

    </section>

    <section id="goalList">

    </section>

</div>

<button id="addButton">
+
</button>

<div id="modal" class="hidden">

    <div class="modalContent">

        <h2>Nuevo objetivo</h2>

        <input
        id="goalEmoji"
        placeholder="😀 Emoji">

        <input
        id="goalName"
        placeholder="Nombre">

        <input
        id="goalTarget"
        type="number"
        placeholder="Meta">

        <select id="goalUnit">

            <option>pasos</option>

            <option>horas</option>

            <option>minutos</option>

            <option>litros</option>

            <option>km</option>

            <option>kg</option>

            <option>páginas</option>

            <option>sesiones</option>

            <option>personalizado</option>

        </select>

        <select id="goalCategory">

            <option>❤️ Salud</option>

            <option>📚 Estudio</option>

            <option>🏋 Gimnasio</option>

            <option>💼 Trabajo</option>

            <option>💰 Finanzas</option>

            <option>🧠 Personal</option>

            <option>🎮 Ocio</option>

        </select>

        <input
        type="color"
        id="goalColor"
        value="#4CAF50">

        <div class="modalButtons">

            <button id="cancelButton">
                Cancelar
            </button>

            <button id="saveButton">
                Guardar
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
